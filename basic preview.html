<!DOCTYPE html>
<html>

<head>
  <title>Flood Monitoring Dashboard</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    #left {
      width: 35%;
      padding: 10px;
      overflow-y: auto;
    }

    #right {
      width: 65%;
      display: flex;
      flex-direction: column;
    }

    #map {
      height: 70%;
    }

    #debug {
      height: 30%;
      background: black;
      color: lime;
      overflow-y: auto;
      font-size: 12px;
      padding: 5px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .warn {
      background: rgba(255, 0, 0, 0.2);
    }

    button {
      margin-right: 5px;
    }
  </style>
</head>

<body>

  <div id="left">
    <div>
      <button onclick="connect()">Connect</button>
      <button onclick="disconnect()">Disconnect</button>
      <span id="status">Disconnected</span>
    </div>

    <div id="notifications"></div>
  </div>

  <div id="right">
    <div id="map"></div>
    <div id="debug"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    let port, reader;
    let buffer = "";
    let markers = {};

    let map = L.map('map').setView([23.76, 90.39], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);

    function log(msg) {
      const debug = document.getElementById("debug");
      debug.innerHTML += msg + "<br>";
      debug.scrollTop = debug.scrollHeight;
    }

    async function connect() {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });

      document.getElementById("status").innerText = "Connected";

      reader = port.readable.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        // ✅ Append incoming chunk
        buffer += decoder.decode(value, { stream: true });

        // ✅ Split complete lines safely
        let lines = buffer.split(/\r?\n/);

        // Keep last incomplete line
        buffer = lines.pop();

        for (let line of lines) {
          line = line.trim();

          if (line.length > 0) {
            log(line);
            handleData(line);
          }
        }
      }
    }

    async function disconnect() {
      try {
        if (reader) await reader.cancel();
        if (port) await port.close();
      } catch (e) { }

      document.getElementById("status").innerText = "Disconnected";
    }

    function handleData(data) {
      try {
        let json = JSON.parse(data);

        console.log("VALID JSON:", json);

        let time = new Date().toLocaleTimeString();

        if (json.type === "Rescue" || json.type === "Supply") {
          addRequestCard(json, time);
          addMarker(json);
        }

        if (json.type === "warn") {
          addWarningCard(time);
        }

      } catch (e) {
        console.warn("INVALID JSON:", data);
      }
    }

    function addRequestCard(data, time) {
      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
    <b>${data.type}</b><br>
    ID: ${data.id}<br>
    Time: ${time}<br>
    <button onclick="removeCard(this, '${data.id}')">Clear</button>
  `;

      document.getElementById("notifications").appendChild(div);
    }

    function addWarningCard(time) {
      let div = document.createElement("div");
      div.className = "card warn";

      div.innerHTML = `
    <b>Flood Level Detected</b><br>
    Time: ${time}<br>
    <button onclick="this.parentElement.remove()">Clear</button>
  `;

      document.getElementById("notifications").appendChild(div);
    }

    function addMarker(data) {
      let lat = parseFloat(data.lat);
      let lon = parseFloat(data.lon);

      if (isNaN(lat) || isNaN(lon)) {
        console.warn("Invalid coordinates:", data);
        return;
      }

      // Remove old marker if exists
      if (markers[data.id]) {
        map.removeLayer(markers[data.id]);
      }

      let marker = L.marker([lat, lon]).addTo(map)
        .bindPopup(data.id);

      markers[data.id] = marker;
    }

    function removeCard(btn, id) {
      btn.parentElement.remove();

      if (markers[id]) {
        map.removeLayer(markers[id]);
        delete markers[id];
      }
    }
  </script>

</body>

</html>
